window:
  dynamic_title: true
font:
  normal:
    family: JetBrainsMono Nerd Font Mono
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font Mono
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font Mono
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font Mono
    style: Bold Italic
env:
  WINIT_X11_SCALE_FACTOR: "1.0"
  TERM: "xterm-256color"
import:
  - ~/.config/alacritty/themes/tokyonight/moon.yml
